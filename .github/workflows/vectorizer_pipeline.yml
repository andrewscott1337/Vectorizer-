name: Vectorizer Pipeline

on:
  workflow_dispatch:

jobs:
  process_images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr potrace poppler-utils libagg-dev libcairo2-dev pkg-config libpotrace-dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless opencv-contrib-python-headless numpy pytesseract reportlab svglib pypotrace ezdxf

      - name: Download EDSR Model
        run: |
          if [ ! -f EDSR_x4.pb ]; then
            python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/Saafke/EDSR_Tensorflow/raw/master/models/EDSR_x4.pb', 'EDSR_x4.pb')"
          fi

      - name: Run Core Processing Engine
        run: |
          python processor.py

      - name: Commit and Push Output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add outputs/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add processed PDFs" && git push)
