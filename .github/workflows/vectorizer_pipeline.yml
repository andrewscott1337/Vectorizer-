name: Vectorizer Pipeline

on:
  workflow_dispatch:

jobs:
  process_images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr potrace poppler-utils libagg-dev libcairo2-dev pkg-config libpotrace-dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt

      - name: Download EDSR Model
        run: |
          EXPECTED_HASH="dd35ce3cae53ecee2d16045e08a932c3e7242d641bb65cb971d123e06904347f"
          if [ ! -f EDSR_x4.pb ]; then
            python -c "import urllib.request; urllib.request.urlretrieve('https://github.com/Saafke/EDSR_Tensorflow/raw/master/models/EDSR_x4.pb', 'EDSR_x4.pb')"
          fi
          ACTUAL_HASH=$(sha256sum EDSR_x4.pb | awk '{ print $1 }')
          if [ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]; then
            echo "Error: Checksum mismatch for EDSR_x4.pb"
            echo "Expected: $EXPECTED_HASH"
            echo "Actual:   $ACTUAL_HASH"
            rm EDSR_x4.pb
            exit 1
          fi

      - name: Run Core Processing Engine
        run: |
          python processor.py

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vectorizer-outputs
          path: outputs/
